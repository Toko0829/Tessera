# Local development infrastructure for Tessera: PostgreSQL and Redis.
# Start with: docker compose up -d
# This is for local development only. Production resolves connection details from
# AWS Secrets Manager / SSM at runtime, never from this file (CLAUDE.md §6).

services:
  postgres:
    image: postgres:17
    container_name: tessera-postgres
    environment:
      POSTGRES_DB: tessera
      POSTGRES_USER: tessera
      # Local dev default; override by copying .env.example to .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tessera_dev}
    ports:
      # Host 5433 to avoid clashing with a native PostgreSQL on the default 5432.
      - "5433:5432"
    volumes:
      - tessera_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tessera -d tessera"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: tessera-redis
    ports:
      - "6379:6379"

  # S3-compatible object storage for local development. The same code targets real
  # AWS S3 in production; only the endpoint and credentials differ.
  minio:
    image: minio/minio
    container_name: tessera-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tessera
      # Local dev default; override by copying .env.example to .env
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-tessera_dev_minio}
      # Allow the dev web app to upload directly to storage from the browser.
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:4200"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tessera_minio:/data

volumes:
  tessera_pg:
  tessera_minio:
