# Local development infrastructure for Tessera: PostgreSQL and Redis.
# Start with: docker compose up -d
# This is for local development only. Production resolves connection details from
# AWS Secrets Manager / SSM at runtime, never from this file (CLAUDE.md §6).

services:
  postgres:
    image: postgres:17
    container_name: tessera-postgres
    environment:
      POSTGRES_DB: tessera
      POSTGRES_USER: tessera
      # Local dev default; override by copying .env.example to .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tessera_dev}
    ports:
      - "5432:5432"
    volumes:
      - tessera_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tessera -d tessera"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: tessera-redis
    ports:
      - "6379:6379"

volumes:
  tessera_pg:
